# =====================================================================
# pointcloud_to_laserscan_params.yaml
# MID360 3D 포인트클라우드(/livox/lidar, PointCloud2) → 2D /scan 변환
#
# 핵심 개념:
#   target_frame: base_link 로 변환 후 z 슬라이스를 자르므로,
#   min/max_height 는 "base_link(로봇) 기준 높이"다. 라이다 마운트가
#   살짝 기울어도 슬라이스는 수평 유지.
#
# 슬라이스 [-0.03, 1.00] (base_link) 선정 근거:
#   - 라이다 지면높이 ≈ 0.43m, base_link 지면높이 0.0635m
#   - min -0.03 ≈ 지면 +3.3cm: 평평한 바닥(지면 0)은 제외하되 유리창 밑 9cm
#     턱은 잡도록 내림 (자세한 근거는 아래 min_height 주석 참고)
#   - max 1.00: 천장/돌출물이 벽으로 오인되는 것 방지
#   → 벽 + 낮은 턱을 잡아 스캔매칭 + 유리 통과 방지
# =====================================================================

pointcloud_to_laserscan:
  ros__parameters:
    target_frame: base_link
    transform_tolerance: 0.1

    # 유리창 밑 ~9cm 턱(불투명 고체)을 잡기 위해 0.03 → -0.03 으로 내림.
    #   base_link 기준 -0.03 ≈ 지면 +3.3cm (base_link 지면높이 0.0635m).
    #   → 턱의 3.3~9cm 면이 scan 에 들어옴. 평평한 바닥(지면 0 = base_link -0.0635)은
    #     여전히 -0.03 아래라 제외 → 솟은 것만 잡혀 바닥 노이즈 없음.
    #   유리는 투명/반투명이라 직접 잡기 어려우나, 불투명 턱은 일관되게 잡혀
    #   slam 이 벽으로 매핑 → planner 가 유리 앞에서 멈춰 통과 방지.
    #   ⚠ MID360 하향 FOV -7° 한계로 턱은 ~2.8m 거리부터 보임(코앞은 사각).
    #     → 맵 기반 회피로 동작(미리 박힘), 코앞 반응정지로는 안 막힘.
    min_height: -0.03        # [m] base_link 기준 (지면 +3.3cm)
    max_height: 1.00

    angle_min: -3.14159      # 360° 전방위 (MID360 수평 FOV 360°)
    angle_max: 3.14159
    angle_increment: 0.0044  # 0.25° — MID360 10Hz 프레임(~20k pts)이면 충분히 채움
    scan_time: 0.1           # 10 Hz
    range_min: 0.20          # 실측 진단 결과(2026-06-10): 라이다가 높아 섀시는 스캔평면 밖 →
                             # 0.10까지 낮춰도 차체 미탐지. 유일한 자기탐지=전우(315°) 0.12m
                             # (고정 구조물) → 0.20 으로 그것만 배제하고 0.20m까지 관측.
                             # 회전 위험구역(차체모서리 ~0.33m)을 라이다가 보게 됨.
    range_max: 15.0          # slam_toolbox max_laser_range 와 일치
    use_inf: true
    inf_epsilon: 1.0
